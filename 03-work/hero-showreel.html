<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Showreel — Concept Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF8200;
      --dark: #050c13;
      --white: #fff;
      --fc: 'Barlow Condensed', sans-serif;
      --fd: 'Barlow', sans-serif;
      --nav-h: 44px;
    }

    html { scroll-behavior: auto; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--fd);
      overflow-x: hidden;
    }

    /* ============================================================
       NAV — fixed top bar for concept switching
    ============================================================ */
    .cnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 9000;
      background: rgba(5, 12, 19, 0.92);
      border-bottom: 1px solid rgba(255,130,0,0.2);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      backdrop-filter: blur(8px);
    }

    .cnav__tabs {
      display: flex;
      align-items: stretch;
      gap: 2px;
      flex-shrink: 0;
    }

    .cnav__tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-family: var(--fc);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0 16px;
      cursor: pointer;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: color 0.15s;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
    }

    .cnav__tab .tab-letter {
      color: inherit;
      font-size: 13px;
    }

    .cnav__tab .tab-name {
      display: none;
    }

    @media (min-width: 600px) {
      .cnav__tab .tab-name { display: inline; }
    }

    .cnav__tab:hover { color: rgba(255,255,255,0.6); }

    .cnav__tab.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }

    .cnav__divider { display: none; }
    .cnav__note    { display: none; }

    .section-label {
      padding: 10px 20px;
      font-family: var(--fc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      background: var(--dark);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* ============================================================
       HERO — full bleed, clips only, no text, no gradient
    ============================================================ */
    .hero {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 560px;
      overflow: hidden;
      background: #000;
      padding-top: var(--nav-h);
    }

    .hero__clip {
      position: absolute;
      top: var(--nav-h); left: 0; right: 0; bottom: 0;
      opacity: 0;
      transition: none;
    }

    .hero__clip.active { opacity: 1; }

    .hero__clip img,
    .hero__clip video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Progress bar */
    .hero__progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.1);
      z-index: 10;
    }

    .hero__progress-bar {
      height: 100%;
      background: var(--orange);
      width: 0%;
    }

    /* transition driven by JS for per-concept timing */

    /* ============================================================
       FALLBACK SECTION
    ============================================================ */
    .fallback-section {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 560px;
      overflow: hidden;
      background: #000;
      border-top: 1px solid rgba(255,130,0,0.3);
    }

    .fallback-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fallback-label {
      position: absolute;
      top: 14px;
      left: 18px;
      font-family: var(--fc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(5,12,19,0.75);
      padding: 4px 10px;
      backdrop-filter: blur(4px);
    }

    /* ============================================================
       REEL INTRO — minimal scroll prompt
    ============================================================ */
    .reel-intro {
      background: var(--dark);
      padding: 48px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,130,0,0.15);
    }

    .reel-intro__label {
      font-family: var(--fc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      display: block;
      margin-top: 10px;
    }

    .reel-intro__arrow {
      color: rgba(255,130,0,0.4);
      font-size: 18px;
      display: block;
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* ============================================================
       SCENE REEL — scroll-driven (same as winning horse)
    ============================================================ */
    #transformation {
      position: relative;
      height: 700vh;
      background: var(--dark);
    }

    .scene-sticky {
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-wrapper {
      position: relative;
      width: 92vw;
      aspect-ratio: 16 / 9;
      max-height: 78vh;
      overflow: hidden;
      outline: 1px solid rgba(255,130,0,0.18);
      outline-offset: -1px;
    }

    @media (min-width: 768px) {
      .scroll-wrapper { width: 80vw; }
    }

    .scene-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .scene-layer.active { opacity: 1; }

    .scene-layer img,
    .scene-layer video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scene-ui {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .scene-counter {
      position: absolute;
      top: 14px; right: 18px;
      font-family: var(--fc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--orange);
      text-transform: uppercase;
    }

    .scene-descriptor {
      position: absolute;
      bottom: 18px; left: 18px;
      font-family: var(--fd);
      font-weight: 900;
      font-size: clamp(16px, 3.5vw, 28px);
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--white);
      text-shadow: 0 2px 14px rgba(0,0,0,0.7);
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .scene-descriptor.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================================
       REEL FOOTER — concept note at bottom
    ============================================================ */
    .reel-footer {
      background: var(--dark);
      border-top: 1px solid rgba(255,130,0,0.1);
      padding: 28px 20px;
      text-align: center;
    }

    .reel-footer__text {
      font-family: var(--fc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    .reel-footer__text strong { color: rgba(255,130,0,0.5); }
  </style>
</head>
<body>

<!-- ============================================================
     NAV
============================================================ -->
<nav class="cnav" id="cnav">
  <div class="cnav__tabs" id="cnavTabs">
    <button class="cnav__tab active" data-c="a">
      <span class="tab-letter">A</span>
      <span class="tab-name">All Motion</span>
    </button>
    <button class="cnav__tab" data-c="b">
      <span class="tab-letter">B</span>
      <span class="tab-name">Crowd + Tech</span>
    </button>
    <button class="cnav__tab" data-c="c">
      <span class="tab-letter">C</span>
      <span class="tab-name">Events / Tech</span>
    </button>
  </div>
  <div class="cnav__divider"></div>
  <div class="cnav__note" id="cnavNote">
Tech and scale — divided differently between hero and reel each concept.
  </div>
</nav>

<!-- ============================================================
     HERO
============================================================ -->
<div class="section-label" style="padding-top: calc(var(--nav-h) + 10px)">hero</div>
<section class="hero" id="hero">
  <div class="hero__progress">
    <div class="hero__progress-bar" id="progressBar"></div>
  </div>
</section>

<!-- ============================================================
     FALLBACK IMAGE
============================================================ -->
<div class="section-label">fallback image</div>
<div class="fallback-section" id="fallbackSection">
  <img id="fallbackImg" src="" alt="" />
</div>

<!-- ============================================================
     PROJECTS
============================================================ -->
<div class="section-label">projects <span id="reelIntroLabel" style="display:none"></span></div>
<section id="transformation">
  <div class="scene-sticky">
    <div class="scroll-wrapper" id="scrollWrapper">
      <div class="scene-ui">
        <div class="scene-counter" id="scrollCounter">01 / 07</div>
        <div class="scene-descriptor" id="sceneDescriptor"></div>
      </div>
    </div>
  </div>
</section>

<div class="reel-footer">
  <div class="reel-footer__text" id="reelFooter">
    Concept A &nbsp;·&nbsp; <strong>Environments → Audience</strong>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  /* ============================================================
     CONCEPT DATA
  ============================================================ */

  // Each clip earns its place: SCALE (room size), TECH (Unreal, live, real-time),
  // RANGE (different worlds), or STAKES (weekly, real, not a game that ships once).
  // seek = skip past clip opening to where the action is.
  // Hero/reel share zero clips within each concept.

  const CONCEPTS = {

    a: {
      name: 'All Motion',
      interval: 4000,
      fallback: '../04-sources/assets/images/events/christmas/christmas-hero-crowd-forest.webp',
      navNote: '<strong>Hero:</strong> the tech — what the system makes &nbsp;·&nbsp; <strong>Reel:</strong> the scale — who it serves',
      reelIntro: 'The stage resets every week.<br>These are some highlights.',
      footerNote: 'Concept A &nbsp;·&nbsp; <strong>The Work</strong> &nbsp;·&nbsp; fallback: christmas-hero-crowd-forest.webp',
      hero: [
        { type: 'video', src: '../04-sources/assets/videos/messages/mountain-top.mp4' },
        { type: 'video', src: '../04-sources/assets/videos/messages/lion.mp4', seek: 12 },
        { type: 'video', src: '../04-sources/assets/videos/messages/rock-water.mp4' },
        { type: 'video', src: '../04-sources/assets/videos/messages/red-sea-part-action.mp4', seek: 7 },
        { type: 'video', src: '../04-sources/assets/videos/messages/noah-arc-transition.mp4' },
        { type: 'video', src: '../04-sources/assets/videos/messages/basketball-long.mp4' },
        { type: 'video', src: '../04-sources/assets/videos/messages/scorpian-arena-crush.mp4', seek: 9 },
      ],
      reel: [
        { type: 'image', src: '../04-sources/assets/images/events/christmas/christmas-performers-forest.webp', descriptor: 'Christmas.\nLive performers.' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-title-screen.webp',   descriptor: 'Super Bowl.\nSame room.' },
        { type: 'image', src: '../04-sources/assets/images/events/journey/journey-roman-wide.webp',           descriptor: 'Ancient Rome.\nFrom Cincinnati.' },
        { type: 'image', src: '../04-sources/assets/images/events/easter/easter-overhead-wide.webp',          descriptor: 'Easter.\n3,400 people.' },
        { type: 'image', src: '../04-sources/assets/images/music/text-2.webp',                                descriptor: 'Worship.\nEvery week.' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-cathedral-dark.webp', descriptor: 'Message.\nEvery week.' },
      ],
    },

    b: {
      name: 'Crowd + Tech',
      interval: 4500,
      fallback: '../04-sources/assets/images/events/christmas/christmas-hero-crowd-forest.webp',
      navNote: '<strong>Hero:</strong> crowd first — proof it\'s live &nbsp;·&nbsp; <strong>Reel:</strong> key events',
      reelIntro: 'The stage resets every week.<br>These are some highlights.',
      footerNote: 'Concept B &nbsp;·&nbsp; <strong>The Room</strong> &nbsp;·&nbsp; crowd-first hero / events reel',
      hero: [
        // SCALE: 3,400 people in a forest — proof it's live before the tech appears
        { type: 'image', src: '../04-sources/assets/images/events/christmas/christmas-hero-crowd-forest.webp' },
        // TECH: what those 3,400 people are watching
        { type: 'video', src: '../04-sources/assets/videos/messages/red-sea-part-action.mp4', seek: 7 },
        // RANGE: Super Bowl concert energy — kills the church assumption, warm orange contrast to Christmas forest
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-orange-concert.webp' },
        // TECH: the lion — different world, same stage
        { type: 'video', src: '../04-sources/assets/videos/messages/lion.mp4', seek: 12 },
        // SCALE: overhead — the full room, 3,400 people, every week
        { type: 'image', src: '../04-sources/assets/images/events/easter/easter-overhead-wide.webp' },
        // TECH: mountaintop — the punchline
        { type: 'video', src: '../04-sources/assets/videos/messages/mountain-top.mp4' },
      ],
      reel: [
        { type: 'image', src: '../04-sources/assets/images/events/christmas/christmas-performers-forest.webp', descriptor: 'Christmas.\nLive performers.' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-title-screen.webp',   descriptor: 'Super Bowl.\nSame room.' },
        { type: 'image', src: '../04-sources/assets/images/events/journey/journey-roman-wide.webp',           descriptor: 'Ancient Rome.\nFrom Cincinnati.' },
        { type: 'image', src: '../04-sources/assets/images/music/text-2.webp',                                descriptor: 'Worship.\nEvery week.' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-cathedral-dark.webp', descriptor: 'Message.\nEvery week.' },
        { type: 'image', src: '../04-sources/assets/images/events/easter/easter-hands-raised.webp',           descriptor: 'The response.\nEvery week.' },
      ],
    },

    c: {
      name: 'Events / Tech',
      interval: 3000,
      fallback: '../04-sources/assets/images/events/christmas/christmas-hero-crowd-forest.webp',
      navNote: '<strong>Hero:</strong> six different events — the weekly reset &nbsp;·&nbsp; <strong>Reel:</strong> the tech that makes each one possible',
      reelIntro: 'Scroll — the tech that makes this possible.',
      footerNote: 'Concept C &nbsp;·&nbsp; <strong>Seven Days</strong> &nbsp;·&nbsp; events hero / tech reel',
      hero: [
        // Max contrast between adjacent clips — every world feels completely different
        { type: 'image', src: '../04-sources/assets/images/events/christmas/christmas-hero-crowd-forest.webp' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-videogame-led.webp' },
        { type: 'image', src: '../04-sources/assets/images/events/journey/journey-roman-wide.webp' },
        { type: 'image', src: '../04-sources/assets/images/events/super-bowl/super-bowl-cathedral-dark.webp' },
        { type: 'image', src: '../04-sources/assets/images/events/easter/easter-overhead-wide.webp' },
        { type: 'image', src: '../04-sources/assets/images/events/christmas/christmas-performers-forest.webp' },
      ],
      reel: [
        // All 7 tech video environments — the how behind the what
        { type: 'video', src: '../04-sources/assets/videos/messages/mountain-top.mp4',                        descriptor: 'A mountaintop.\nInside a room.' },
        { type: 'video', src: '../04-sources/assets/videos/messages/lion.mp4',         seek: 12,              descriptor: "Lion's Den.\nBuilt in a day." },
        { type: 'video', src: '../04-sources/assets/videos/messages/rock-water.mp4',                          descriptor: 'Rock.\nReal time.' },
        { type: 'video', src: '../04-sources/assets/videos/messages/red-sea-part-action.mp4', seek: 7,        descriptor: 'Red Sea.\nReal time. Unreal Engine.' },
        { type: 'video', src: '../04-sources/assets/videos/messages/noah-arc-transition.mp4',                 descriptor: "Noah's Ark.\nTo scale." },
        { type: 'video', src: '../04-sources/assets/videos/messages/basketball-long.mp4',                     descriptor: 'Live scale.' },
        { type: 'video', src: '../04-sources/assets/videos/messages/scorpian-arena-crush.mp4', seek: 9,       descriptor: 'A coliseum.\nOn stage.' },
      ],
    },

  };

  /* ============================================================
     STATE
  ============================================================ */
  let activeConcept   = 'a';
  let heroCurrent     = 0;
  let heroTimer       = null;
  let currentInterval = 4500;
  let sceneActive     = 0;
  let descTimer       = null;
  let st              = null;
  const INTERVAL      = 4500;

  /* ============================================================
     HERO CYCLING
  ============================================================ */
  const heroEl      = document.getElementById('hero');
  const progressBar = document.getElementById('progressBar');

  function startProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    void progressBar.offsetWidth;
    progressBar.style.transition = `width ${currentInterval / 1000}s linear`;
    progressBar.style.width = '100%';
  }

  function getHeroClips() {
    return heroEl.querySelectorAll('.hero__clip');
  }

  function advanceHero() {
    const clips = getHeroClips();
    if (!clips.length) return;
    const current = heroCurrent;
    const next    = (current + 1) % clips.length;

    const nextVid = clips[next].querySelector('video');
    const s       = parseFloat(clips[next].dataset.seek || '0');

    function doSwitch() {
      clips[current].classList.remove('active');
      clips[next].classList.add('active');

      const curVid = clips[current].querySelector('video');
      if (curVid) {
        curVid.pause();
        curVid.currentTime = parseFloat(clips[current].dataset.seek || '0');
      }

      if (nextVid) nextVid.play().catch(() => {});
      heroCurrent = next;
      startProgress();
    }

    if (nextVid) {
      // Keep current clip visible until the next frame is decoded and ready
      nextVid.currentTime = s;
      nextVid.addEventListener('seeked', doSwitch, { once: true });
    } else {
      doSwitch();
    }
  }

  function buildHero(conceptKey) {
    const concept = CONCEPTS[conceptKey];
    currentInterval = concept.interval || INTERVAL;
    const clips = concept.hero;

    // Remove existing clips (keep progress bar)
    heroEl.querySelectorAll('.hero__clip').forEach(el => el.remove());

    // Build new clips
    clips.forEach((clip, i) => {
      const div = document.createElement('div');
      div.className = 'hero__clip' + (i === 0 ? ' active' : '');
      if (clip.seek) div.dataset.seek = clip.seek;
      if (clip.type === 'video') {
        const vid = document.createElement('video');
        vid.muted = true;
        vid.loop  = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'auto';
        const src = document.createElement('source');
        src.src  = clip.src;
        src.type = 'video/mp4';
        vid.appendChild(src);
        div.appendChild(vid);
        if (clip.seek) {
          const seekTo = parseFloat(clip.seek);
          vid.loop = false;
          vid.addEventListener('timeupdate', function() {
            if (this.duration && this.currentTime >= this.duration - 0.8) {
              this.currentTime = seekTo;
            }
          });
          vid.addEventListener('ended', function() {
            this.currentTime = seekTo;
            this.play().catch(() => {});
          });
        }
        if (i === 0) {
          if (clip.seek) vid.currentTime = clip.seek;
          vid.play().catch(() => {});
        } else {
          vid.addEventListener('loadedmetadata', function() {
            this.currentTime = clip.seek || 0;
          }, { once: true });
        }
      } else {
        const img = document.createElement('img');
        img.src = clip.src;
        img.alt = '';
        div.appendChild(img);
      }
      // Insert before progress bar
      heroEl.insertBefore(div, heroEl.querySelector('.hero__progress'));
    });

    heroCurrent = 0;
    clearInterval(heroTimer);
    heroTimer = setInterval(advanceHero, currentInterval);
    startProgress();
  }

  /* ============================================================
     SCENE REEL
  ============================================================ */
  const scrollWrapper = document.getElementById('scrollWrapper');
  const scrollCounter = document.getElementById('scrollCounter');
  const descriptor    = document.getElementById('sceneDescriptor');

  function buildReel(conceptKey) {
    const concept = CONCEPTS[conceptKey];
    const scenes  = concept.reel;

    // Remove existing scene layers
    scrollWrapper.querySelectorAll('.scene-layer').forEach(el => el.remove());

    // Build new layers
    scenes.forEach((scene, i) => {
      const div = document.createElement('div');
      div.className = 'scene-layer' + (i === 0 ? ' active' : '');
      div.dataset.descriptor = scene.descriptor || '';
      if (scene.seek) div.dataset.seek = scene.seek;

      if (scene.type === 'video') {
        const vid = document.createElement('video');
        vid.muted = true;
        vid.loop  = true;
        vid.setAttribute('playsinline', '');
        vid.preload = 'none';
        const src = document.createElement('source');
        src.src  = scene.src;
        src.type = 'video/mp4';
        vid.appendChild(src);
        div.appendChild(vid);
        if (scene.seek) {
          const seekTo = parseFloat(scene.seek);
          vid.loop = false;
          vid.addEventListener('timeupdate', function() {
            if (this.duration && this.currentTime >= this.duration - 0.8) {
              this.currentTime = seekTo;
            }
          });
          vid.addEventListener('ended', function() {
            this.currentTime = seekTo;
            this.play().catch(() => {});
          });
        }
      } else {
        const img = document.createElement('img');
        img.src     = scene.src;
        img.alt     = '';
        img.loading = i === 0 ? 'eager' : 'lazy';
        div.appendChild(img);
      }

      // Insert before .scene-ui
      const ui = scrollWrapper.querySelector('.scene-ui');
      scrollWrapper.insertBefore(div, ui);
    });

    sceneActive = 0;
    scrollCounter.textContent = `01 / ${String(scenes.length).padStart(2, '0')}`;
    descriptor.textContent = '';
    descriptor.classList.remove('visible');

    // Update #transformation height based on scene count
    const N = scenes.length;
    document.getElementById('transformation').style.height = (N * 100) + 'vh';

    // Rebuild ScrollTrigger
    if (st) { st.kill(); st = null; }

    st = ScrollTrigger.create({
      trigger: '#transformation',
      start: 'top top',
      end: 'bottom bottom',
      scrub: 0.1,
      onUpdate(self) {
        const layers = scrollWrapper.querySelectorAll('.scene-layer');
        const n      = layers.length;
        const p      = self.progress;

        const expStart = (n - 1) / n;
        const inExp    = p >= expStart;

        const sceneP = Math.min(p / (inExp ? expStart : 1), 1);
        const raw    = Math.floor(sceneP * n);
        const idx    = Math.min(raw, n - 1);

        if (idx !== sceneActive) {
          layers[sceneActive].classList.remove('active');
          const prev = layers[sceneActive].querySelector('video');
          if (prev) prev.pause();

          layers[idx].classList.add('active');
          const vid = layers[idx].querySelector('video');
          if (vid) {
            const s = parseFloat(layers[idx].dataset.seek || '0');
            if (s > 0) vid.currentTime = s;
            vid.play().catch(() => {});
          }

          scrollCounter.textContent = `${String(idx + 1).padStart(2, '0')} / ${String(n).padStart(2, '0')}`;

          descriptor.classList.remove('visible');
          clearTimeout(descTimer);
          const text = layers[idx].dataset.descriptor;
          if (text) {
            descTimer = setTimeout(() => {
              descriptor.innerHTML = text.replace(/\n/g, '<br>');
              descriptor.classList.add('visible');
            }, 100);
          } else {
            descriptor.textContent = '';
          }

          sceneActive = idx;
        }

        // Frame expansion on last scene
        if (inExp) {
          const t     = Math.min((p - expStart) / (1 / n), 1);
          const baseW = window.innerWidth < 768 ? 92 : 80;
          scrollWrapper.style.width   = (baseW + t * (100 - baseW)) + 'vw';
          scrollWrapper.style.opacity = t > 0.6 ? String(1 - (t - 0.6) / 0.4) : '1';
        } else {
          scrollWrapper.style.width   = window.innerWidth < 768 ? '92vw' : '80vw';
          scrollWrapper.style.opacity = '1';
        }
      }
    });
  }

  /* ============================================================
     CONCEPT SWITCHING
  ============================================================ */
  const cnavNote    = document.getElementById('cnavNote');
  const reelIntroEl = document.getElementById('reelIntroLabel');
  const reelFooter  = document.getElementById('reelFooter');
  const fallbackImg = document.getElementById('fallbackImg');

  function switchConcept(key) {
    if (key === activeConcept) return;
    activeConcept = key;

    // Update tabs
    document.querySelectorAll('.cnav__tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.c === key);
    });

    // Update meta text
    cnavNote.innerHTML      = CONCEPTS[key].navNote;
    reelIntroEl.innerHTML = CONCEPTS[key].reelIntro;
    reelFooter.innerHTML    = CONCEPTS[key].footerNote;
    fallbackImg.src         = CONCEPTS[key].fallback;

    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'instant' });

    // Rebuild hero + reel
    buildHero(key);
    buildReel(key);
  }

  // Tab click handlers
  document.querySelectorAll('.cnav__tab').forEach(btn => {
    btn.addEventListener('click', () => switchConcept(btn.dataset.c));
  });

  /* ============================================================
     INIT
  ============================================================ */
  fallbackImg.src = CONCEPTS['a'].fallback;
  buildHero('a');
  buildReel('a');
</script>
</body>
</html>
